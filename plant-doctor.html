<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taylor's Plant Doctor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&display=swap');

:root{
  --ink:#23301E;
  --paper:#ECE6D3;
  --paper-light:#F5F1E4;
  --moss:#56683C;
  --moss-dark:#3A472A;
  --clay:#A85D3B;
  --gold:#B98A3E;
  --sage:#C7CBB4;
  --line: rgba(35,48,30,0.18);
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Work Sans', sans-serif;
  min-height:100vh;
  padding:32px 16px 60px;
}

.wrap{
  max-width:560px;
  margin:0 auto;
}

.masthead{
  text-align:center;
  padding-bottom:22px;
  border-bottom:1.5px solid var(--line);
  margin-bottom:28px;
}

.eyebrow{
  font-size:11px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--moss);
  font-weight:600;
  margin-bottom:6px;
}

h1{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:500;
  font-size:34px;
  color:var(--ink);
  line-height:1.1;
}

.subhead{
  font-size:13.5px;
  color:var(--moss-dark);
  margin-top:8px;
  opacity:0.85;
}

.card{
  background:var(--paper-light);
  border:1px solid var(--line);
  border-radius:4px;
  padding:24px;
  margin-bottom:20px;
}

.field-label{
  font-family:'Fraunces', serif;
  font-size:15px;
  font-weight:500;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}

.field-label .num{
  font-size:11px;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--moss);
  color:var(--paper-light);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Work Sans',sans-serif;
  font-weight:600;
}

#dropzone{
  border:1.5px dashed var(--sage);
  border-radius:4px;
  padding:22px;
  text-align:center;
  cursor:pointer;
  transition:border-color 0.15s ease, background 0.15s ease;
  position:relative;
}

#dropzone:hover, #dropzone.drag{
  border-color:var(--moss);
  background:rgba(86,104,60,0.05);
}

#dropzone svg{
  width:26px;
  height:26px;
  stroke:var(--moss);
  margin-bottom:8px;
}

#dropzone .dz-text{
  font-size:13.5px;
  color:var(--moss-dark);
}

#dropzone .dz-sub{
  font-size:11.5px;
  color:var(--moss-dark);
  opacity:0.6;
  margin-top:3px;
}

#fileInput{ display:none; }

#preview{
  display:none;
  margin-top:14px;
  position:relative;
}

#preview img{
  width:100%;
  max-height:260px;
  object-fit:cover;
  border-radius:4px;
  border:1px solid var(--line);
  display:block;
}

#preview .remove{
  position:absolute;
  top:8px;
  right:8px;
  background:var(--ink);
  color:var(--paper-light);
  border:none;
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
  font-size:14px;
  line-height:1;
}

textarea{
  width:100%;
  min-height:88px;
  border:1px solid var(--line);
  border-radius:4px;
  background:var(--paper-light);
  color:var(--ink);
  font-family:'Work Sans', sans-serif;
  font-size:14px;
  padding:12px 14px;
  resize:vertical;
  line-height:1.5;
}

textarea::placeholder{ color:rgba(35,48,30,0.4); }
textarea:focus, #dropzone:focus-visible{ outline:none; border-color:var(--moss); }

.hint-chips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.chip{
  font-size:11.5px;
  padding:5px 10px;
  border:1px solid var(--line);
  border-radius:20px;
  background:transparent;
  color:var(--moss-dark);
  cursor:pointer;
  font-family:'Work Sans',sans-serif;
}

.chip:hover{ background:var(--sage); border-color:var(--sage); }

button.submit{
  width:100%;
  background:var(--moss);
  color:var(--paper-light);
  border:none;
  border-radius:4px;
  padding:14px;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:background 0.15s ease;
}

button.submit:hover{ background:var(--moss-dark); }
button.submit:disabled{ opacity:0.55; cursor:default; }

#status{
  text-align:center;
  font-size:12.5px;
  color:var(--moss-dark);
  margin-top:10px;
  min-height:16px;
  opacity:0.8;
}

#result{ display:none; }

.stamp-row{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
}

.stamp{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid var(--clay);
  color:var(--clay);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:11px;
  text-align:center;
  line-height:1.2;
  transform:rotate(-6deg);
}

.stamp.mild{ border-color:var(--moss); color:var(--moss); }
.stamp.moderate{ border-color:var(--gold); color:var(--gold); }
.stamp.urgent{ border-color:var(--clay); color:var(--clay); }

.result-title{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-weight:500;
  font-size:22px;
  line-height:1.2;
}

.result-plant{
  font-size:12.5px;
  color:var(--moss-dark);
  margin-top:3px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.section-label{
  font-family:'Fraunces', serif;
  font-weight:500;
  font-size:13px;
  color:var(--moss-dark);
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin:20px 0 10px;
  padding-top:16px;
  border-top:1px solid var(--line);
}

.section-label:first-of-type{ border-top:none; padding-top:0; margin-top:4px; }

ul.steps{ list-style:none; }

ul.steps li{
  display:flex;
  gap:10px;
  font-size:14px;
  line-height:1.55;
  margin-bottom:10px;
}

ul.steps li .bullet{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--moss);
  margin-top:8px;
  flex-shrink:0;
}

p.body-text{ font-size:14px; line-height:1.6; color:var(--ink); }
p.watch{ font-size:13.5px; line-height:1.6; color:var(--moss-dark); background:rgba(185,138,62,0.12); padding:10px 12px; border-radius:4px; border-left:2px solid var(--gold); }

.again{
  text-align:center;
  margin-top:22px;
}

.again button{
  background:none;
  border:1px solid var(--line);
  border-radius:20px;
  padding:8px 18px;
  font-size:12.5px;
  color:var(--moss-dark);
  cursor:pointer;
  font-family:'Work Sans',sans-serif;
}

.again button:hover{ background:var(--sage); }

.error-box{
  display:none;
  background:rgba(168,93,59,0.1);
  border:1px solid var(--clay);
  color:var(--clay);
  padding:12px 14px;
  border-radius:4px;
  font-size:13px;
  margin-bottom:16px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="eyebrow">Field notebook</div>
    <h1>Taylor's Plant Doctor</h1>
    <div class="subhead">Snap a photo, tell it what's been going on, get a fix.</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="card" id="formCard">
    <div class="field-label"><span class="num">1</span> Photo of the plant</div>
    <div id="dropzone" tabindex="0" role="button" aria-label="Add a photo">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
      <div class="dz-text">Tap to take or choose a photo</div>
      <div class="dz-sub">brown spots, wilting, whatever it's doing</div>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
    </div>
    <div id="preview">
      <img id="previewImg" alt="Selected plant photo">
      <button class="remove" id="removeBtn" aria-label="Remove photo">&times;</button>
    </div>

    <div style="height:20px"></div>

    <div class="field-label"><span class="num">2</span> What's the story?</div>
    <textarea id="notes" placeholder="e.g. Got it a week ago, watering every day, kept by a sunny window..."></textarea>
    <div class="hint-chips">
      <button class="chip" data-text="New plant, first week">New plant, first week</button>
      <button class="chip" data-text="Watering daily">Watering daily</button>
      <button class="chip" data-text="Low light spot">Low light spot</button>
      <button class="chip" data-text="Recently repotted">Recently repotted</button>
    </div>

    <div style="height:20px"></div>

    <button class="submit" id="submitBtn">Diagnose it</button>
    <div id="status"></div>
  </div>

  <div class="card" id="result">
    <div class="stamp-row">
      <div class="stamp" id="stamp">mild</div>
      <div>
        <div class="result-plant" id="plantName">—</div>
        <div class="result-title" id="diagTitle">—</div>
      </div>
    </div>

    <div class="section-label">What's likely going on</div>
    <p class="body-text" id="causes"></p>

    <div class="section-label">How to fix it</div>
    <ul class="steps" id="steps"></ul>

    <div class="section-label">Keep an eye on</div>
    <p class="watch" id="watchFor"></p>

    <div class="again">
      <button id="againBtn">Check another plant</button>
    </div>
  </div>

</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const removeBtn = document.getElementById('removeBtn');
const notes = document.getElementById('notes');
const submitBtn = document.getElementById('submitBtn');
const statusEl = document.getElementById('status');
const formCard = document.getElementById('formCard');
const resultCard = document.getElementById('result');
const errorBox = document.getElementById('errorBox');
const againBtn = document.getElementById('againBtn');

let imageBase64 = null;
let imageMediaType = null;

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') fileInput.click(); });

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  imageMediaType = file.type;
  const reader = new FileReader();
  reader.onload = () => {
    imageBase64 = reader.result.split(',')[1];
    previewImg.src = reader.result;
    preview.style.display = 'block';
    dropzone.style.display = 'none';
  };
  reader.readAsDataURL(file);
});

removeBtn.addEventListener('click', () => {
  imageBase64 = null;
  imageMediaType = null;
  fileInput.value = '';
  preview.style.display = 'none';
  dropzone.style.display = 'block';
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const t = chip.dataset.text;
    notes.value = notes.value ? notes.value + ', ' + t.toLowerCase() : t;
  });
});

againBtn.addEventListener('click', () => {
  resultCard.style.display = 'none';
  formCard.style.display = 'block';
  errorBox.style.display = 'none';
});

submitBtn.addEventListener('click', async () => {
  errorBox.style.display = 'none';

  if(!imageBase64){
    errorBox.textContent = 'Add a photo first — that\'s what makes the diagnosis useful.';
    errorBox.style.display = 'block';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Looking it over...';
  statusEl.textContent = 'This usually takes about 10-15 seconds.';

  const userNotes = notes.value.trim() || 'No additional notes given.';

  const systemPrompt = `You are an experienced houseplant doctor helping a plant owner named Taylor figure out what's wrong with a plant from a photo and a short note about its recent care.

Respond ONLY with valid JSON, no markdown fences, no preamble, in exactly this shape:
{
  "plant": "best guess at plant name, or \\"Unidentified plant\\" if unclear",
  "diagnosisTitle": "short punchy title for what's wrong, e.g. Overwatering stress",
  "severity": "mild" | "moderate" | "urgent",
  "likelyCauses": "1-3 sentences in plain, warm, non-jargony language explaining the most likely cause(s) based on the photo and the notes given",
  "fixSteps": ["short actionable step", "short actionable step", "short actionable step"],
  "watchFor": "1-2 sentences on what sign would mean it's improving, or what sign would mean it's getting worse and needs more urgent action"
}

Ground everything in what's visible in the photo and what the notes say. Be specific and practical, not generic. If the plant looks healthy, say so plainly and keep severity "mild" with reassurance rather than inventing a problem. Keep fixSteps to 3-5 items max, each under 20 words.`;

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [
          {
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageMediaType, data: imageBase64 } },
              { type: 'text', text: `Here's the plant. Notes from the owner: "${userNotes}"` }
            ]
          }
        ]
      })
    });

    if(!response.ok){
      throw new Error('API request failed with status ' + response.status);
    }

    const data = await response.json();
    const textBlock = data.content.find(b => b.type === 'text');
    if(!textBlock){ throw new Error('No text in response'); }

    let clean = textBlock.text.trim().replace(/^```json\s*/i, '').replace(/```\s*$/i, '');
    const diagnosis = JSON.parse(clean);

    renderResult(diagnosis);

  } catch(err){
    console.error('Plant Doctor error:', err);
    errorBox.textContent = "Couldn't get a diagnosis just now. Mind trying again in a moment?";
    errorBox.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Diagnose it';
    statusEl.textContent = '';
  }
});

function renderResult(d){
  document.getElementById('plantName').textContent = d.plant || 'Unidentified plant';
  document.getElementById('diagTitle').textContent = d.diagnosisTitle || 'Diagnosis';
  document.getElementById('causes').textContent = d.likelyCauses || '';
  document.getElementById('watchFor').textContent = d.watchFor || '';

  const stamp = document.getElementById('stamp');
  const sev = (d.severity || 'mild').toLowerCase();
  stamp.className = 'stamp ' + sev;
  stamp.textContent = sev;

  const stepsEl = document.getElementById('steps');
  stepsEl.innerHTML = '';
  (d.fixSteps || []).forEach(step => {
    const li = document.createElement('li');
    li.innerHTML = '<span class="bullet"></span><span>' + escapeHtml(step) + '</span>';
    stepsEl.appendChild(li);
  });

  formCard.style.display = 'none';
  resultCard.style.display = 'block';
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
